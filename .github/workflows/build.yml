name: Build & Release

on:
  push:
    tags:
      - 'v*'  # 推送 v 开头的 tag 时触发，如 v1.0.0

permissions:
  contents: write  # 允许创建 Release

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            build_cmd: npm run build:win
          - os: macos-latest
            platform: mac
            build_cmd: npm run build:mac
          - os: ubuntu-latest
            platform: linux
            build_cmd: npm run build:linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build for ${{ matrix.platform }}
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 📋 List artifacts
        run: find artifacts -type f 2>/dev/null || echo "No artifacts directory"; ls -la artifacts/ 2>/dev/null || true

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "🐱 Desktop Pet ${{ github.ref_name }}"
          body: |
            ## 🐱 桌面宠物 ${{ github.ref_name }}

            ### 📥 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | 🪟 Windows | `DesktopPet-*-Windows-Setup.exe` | 安装版 |
            | 🪟 Windows | `DesktopPet-*-Windows-x64.exe` | 便携版（免安装） |
            | 🍎 macOS | `DesktopPet-*-macOS-*.dmg` | DMG 安装包 |
            | 🐧 Linux | `DesktopPet-*-Linux-x64.AppImage` | AppImage（免安装） |
            | 🐧 Linux | `DesktopPet-*-Linux-x64.deb` | Debian/Ubuntu 安装包 |

            ### ⚠️ macOS 用户注意
            首次打开可能提示「无法验证开发者」，请前往 **系统设置 → 隐私与安全** 中点击「仍要打开」。

            ---
            > 如果觉得可爱，请给个 ⭐ Star！
          draft: false
          prerelease: false
          files: artifacts/*
          fail_on_unmatched_files: false
